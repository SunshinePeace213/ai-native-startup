# Project-local Codex config for the /harness-layer:harness-build multi-layer review pipeline.
# The implementation-review orchestrator spawns the 6 read-only review subagents
# defined in .codex/agents/*.toml.

[agents]
# These are the Codex defaults, pinned here explicitly because they already fit
# this design exactly: 6 review subagents, no nested spawning.
max_threads = 6
max_depth = 1

[sandbox_workspace_write]
# uv puts its cache outside the workspace; without this every `uv run` validation
# command dies on "cache permission denied" inside the review sandbox.
writable_roots = ["~/.cache/uv"]
