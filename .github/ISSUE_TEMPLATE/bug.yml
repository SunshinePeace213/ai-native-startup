name: Bug report
description: Report something that is broken or behaving incorrectly
title: "🐛 fix: "
labels: [fix]
assignees: [SunshinePeace213]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this relative to other work?
      options:
        - P0 — critical
        - P1 — high
        - P2 — medium
        - P3 — low
      default: 2
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-paragraph summary of the bug — what goes wrong and how often (always / intermittently / under specific conditions).
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact, ordered steps so anyone can trigger the bug — commands, inputs, required state.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened, including any error messages verbatim.
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: Impact if left unfixed.
      options:
        - S1 — data-loss / crash
        - S2 — major function broken, no workaround
        - S3 — minor function broken, workaround exists
        - S4 — cosmetic
    validations:
      required: true
  - type: dropdown
    id: regression
    attributes:
      label: Regression?
      description: Did this work before?
      options:
        - "yes"
        - "no"
        - unknown
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Where the bug occurs. Fill in what's relevant.
      value: |
        - OS / platform:
        - Runtime (uv / bun / node) version:
        - App version / commit SHA:
        - Branch:
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste relevant log output, or attach screenshots / recordings. Redact secrets.
      render: shell
